[mypy]
# Engine v2 type-check config. Run: python -m mypy src/nadobro/engine
python_version = 3.11
strict_optional = True
ignore_missing_imports = True
# Imports are absolute as ``src.nadobro.*``; anchor module paths at the repo
# root so a file isn't discovered under two module names.
mypy_path = .
explicit_package_bases = True
namespace_packages = True
# Only the engine is type-clean today; don't fail on legacy modules it imports.
follow_imports = silent
warn_redundant_casts = True
no_implicit_optional = True
