# Local Postgres for pytest / development. Usage:
#   docker compose -f compose.postgres-test.yaml up -d
# Then set DATABASE_URL (e.g. in .env.test):
#   postgresql://nadobro:nadobro@127.0.0.1:5433/nadobro_test
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: nadobro-postgres-test
    environment:
      POSTGRES_USER: nadobro
      POSTGRES_PASSWORD: nadobro
      POSTGRES_DB: nadobro_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nadobro -d nadobro_test"]
      interval: 3s
      timeout: 5s
      retries: 5
