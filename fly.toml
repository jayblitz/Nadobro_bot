# Fly.io app for Nadobro bot — deploy with: fly deploy
# First time: fly auth login && fly launch --no-deploy && fly secrets set TELEGRAM_TOKEN=... (etc.) && fly deploy

app = "nadobro-bot"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
