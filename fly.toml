# fly.toml app configuration file generated for nadobro-bot on 2026-05-16T08:40:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nadobro-bot'
primary_region = 'ams'
kill_signal = 'SIGTERM'
kill_timeout = 60

[build]
  dockerfile = 'Dockerfile'

[experimental]
  auto_rollback = true

[deploy]
  strategy = 'rolling'

[env]
  PYTHONUNBUFFERED = "1"
  PYTHONDONTWRITEBYTECODE = "1"
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  TELEGRAM_TRANSPORT = "webhook"
  TELEGRAM_WEBHOOK_PATH = "/telegram/webhook"
  TELEGRAM_WEBHOOK_PORT = "8082"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 8
  memory_mb = 4096
  size = 'shared-cpu-8x'

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
