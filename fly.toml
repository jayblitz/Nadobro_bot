app = "nadobro-bot"
primary_region = "ams"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.health]
      interval = "30s"
      timeout = "5s"
      grace_period = "15s"
      method = "GET"
      path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
