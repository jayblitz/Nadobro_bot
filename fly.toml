# fly.toml app configuration file generated for nadobro-bot on 2026-03-03T16:53:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nadobro-bot'
primary_region = 'ams'

[build]

[env]
  TELEGRAM_TRANSPORT = "webhook"
  TELEGRAM_WEBHOOK_PATH = "/telegram/webhook"
  BOT_DISABLE_MINIAPP = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

# Bot-only ingress via nginx; /health returns static bot health payload.
[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
