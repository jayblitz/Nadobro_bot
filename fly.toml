# fly.toml app configuration file generated for nadobro-bot on 2026-05-18T07:01:13Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nadobro-bot'
primary_region = 'nrt'
kill_signal = 'SIGTERM'
kill_timeout = 60

[build]
  dockerfile = 'Dockerfile'

[experimental]
  auto_rollback = true

[deploy]
  strategy = 'rolling'

[env]
  PYTHONUNBUFFERED = "1"
  PYTHONDONTWRITEBYTECODE = "1"
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  TELEGRAM_TRANSPORT = "webhook"
  TELEGRAM_WEBHOOK_PATH = "/telegram/webhook"
  TELEGRAM_WEBHOOK_PORT = "8082"
  PORT = "8080"
  NADO_FORCE_IPV4 = "1"
  # Portfolio-sync SDK reads (calculate_account_summary, get_trigger_orders,
  # get_matches, get_interest_and_funding_payments) now route through the
  # dedicated SDK thread pool (run_blocking_sdk) instead of the shared default
  # executor. Worst-case fan-out is ~8 users/tick x 6 calls, and cancelled
  # wait_for calls leave their thread running until the socket timeout, so the
  # I/O-bound pool is widened from its 12-worker default to absorb bursts.
  NADO_SDK_POOL_WORKERS = "24"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'performance'
  cpus = 1
  memory_mb = 2048
  size = 'performance-1x'

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
