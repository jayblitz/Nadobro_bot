<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 14px 18px; }
.set { display:grid; grid-template-columns: repeat(7, auto); gap: 14px 18px; align-items:center; font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; }
.cell { display:flex; flex-direction:column; align-items:center; gap:4px; min-width: 64px; }
.glyph { font-size: 26px; line-height: 1; }
.lbl { font: 500 10px/1.1 var(--font-body); color: var(--fg-muted); text-align:center; }
</style></head><body>
<div class="set">
  <div class="cell"><div class="glyph">📊</div><div class="lbl">market</div></div>
  <div class="cell"><div class="glyph">🗞</div><div class="lbl">news</div></div>
  <div class="cell"><div class="glyph">🎯</div><div class="lbl">insight</div></div>
  <div class="cell"><div class="glyph">🟢</div><div class="lbl">long / bull</div></div>
  <div class="cell"><div class="glyph">🔴</div><div class="lbl">short / bear</div></div>
  <div class="cell"><div class="glyph">⚠️</div><div class="lbl">risk</div></div>
  <div class="cell"><div class="glyph">⚡</div><div class="lbl">key info</div></div>
  <div class="cell"><div class="glyph">💡</div><div class="lbl">tip</div></div>
  <div class="cell"><div class="glyph">💰</div><div class="lbl">profit</div></div>
  <div class="cell"><div class="glyph">🏆</div><div class="lbl">points</div></div>
  <div class="cell"><div class="glyph">🔥</div><div class="lbl">hot take</div></div>
  <div class="cell"><div class="glyph">🤖</div><div class="lbl">trade</div></div>
  <div class="cell"><div class="glyph">📁</div><div class="lbl">portfolio</div></div>
  <div class="cell"><div class="glyph">💼</div><div class="lbl">wallet</div></div>
  <div class="cell"><div class="glyph">🧠</div><div class="lbl">strategy</div></div>
  <div class="cell"><div class="glyph">🔔</div><div class="lbl">alerts</div></div>
  <div class="cell"><div class="glyph">⚙️</div><div class="lbl">settings</div></div>
  <div class="cell"><div class="glyph">🌐</div><div class="lbl">mode</div></div>
  <div class="cell"><div class="glyph">🚀</div><div class="lbl">Alpha Agent</div></div>
  <div class="cell"><div class="glyph">✅</div><div class="lbl">confirm</div></div>
  <div class="cell"><div class="glyph">❌</div><div class="lbl">cancel</div></div>
</div>
</body></html>
