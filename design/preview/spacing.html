<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.col { display:flex; flex-direction:column; gap:10px; }
.row { display:flex; gap:10px; align-items:center; }
.box { background: var(--nb-cyan-500); height:14px; border-radius: 3px; }
.lab { font: 500 11px/1 var(--font-mono); color: var(--fg-subtle); width: 64px; }
.tag { font: 600 11px/1 var(--font-body); color: var(--fg-muted); width: 28px; }
</style></head><body>
<div class="col">
  <div class="row"><span class="tag">1</span><div class="box" style="width:4px"></div><span class="lab">4 px</span></div>
  <div class="row"><span class="tag">2</span><div class="box" style="width:8px"></div><span class="lab">8 px</span></div>
  <div class="row"><span class="tag">3</span><div class="box" style="width:12px"></div><span class="lab">12 px</span></div>
  <div class="row"><span class="tag">4</span><div class="box" style="width:16px"></div><span class="lab">16 px</span></div>
  <div class="row"><span class="tag">5</span><div class="box" style="width:20px"></div><span class="lab">20 px</span></div>
  <div class="row"><span class="tag">6</span><div class="box" style="width:24px"></div><span class="lab">24 px</span></div>
  <div class="row"><span class="tag">8</span><div class="box" style="width:32px"></div><span class="lab">32 px</span></div>
  <div class="row"><span class="tag">10</span><div class="box" style="width:40px"></div><span class="lab">40 px</span></div>
</div>
</body></html>
