<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { display:flex; flex-direction:column; gap:12px; padding: 16px; }
.row { display:flex; gap: 10px; align-items:center; }
.btn { font: 600 14px/1 var(--font-body); padding: 12px 16px; border-radius: 12px; border: 1px solid transparent; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
.btn.primary { background: var(--nb-green-500); color: var(--nb-fg-on-pill); box-shadow: 0 8px 20px -8px rgba(34,230,109,0.45); }
.btn.secondary { background: var(--nb-ink-700); color: #fff; border-color: rgba(110,226,240,0.18); }
.btn.ghost { background: transparent; color: var(--nb-cyan-500); }
.btn.danger { background: rgba(255,76,76,0.12); color: #FF4C4C; border-color: rgba(255,76,76,0.4); }
.btn.long { background: rgba(68,238,148,0.12); color: #44EE94; border-color: rgba(68,238,148,0.4); }
.btn.short { background: rgba(255,76,76,0.12); color: #FF4C4C; border-color: rgba(255,76,76,0.4); }
.cap { font: 500 11px/1 var(--font-mono); color: var(--fg-subtle); margin-left: 6px; }
</style></head><body>
<div class="row"><button class="btn primary">✅ Confirm Trade</button><span class="cap">primary · "Bro pill"</span></div>
<div class="row"><button class="btn secondary">📁 Portfolio Deck</button><button class="btn ghost">View History</button><span class="cap">secondary · ghost</span></div>
<div class="row"><button class="btn long">🟢 Long</button><button class="btn short">🔴 Short</button><button class="btn danger">❌ Cancel</button></div>
</body></html>
