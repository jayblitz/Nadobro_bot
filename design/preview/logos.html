<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { display:flex; gap:18px; align-items:center; justify-content:center; padding: 16px; flex-wrap: wrap; }
.tile { display:flex; flex-direction:column; align-items:center; gap:8px; }
.tile .name { font: 600 12px/1 var(--font-body); color: #fff; }
.tile .meta { font: 500 11px/1 var(--font-mono); color: var(--fg-subtle); }
.dark { width:100px; height:100px; border-radius: 22%; background: #04090E; display:flex; align-items:center; justify-content:center; }
.light { width:100px; height:100px; border-radius: 22%; background: #fff; display:flex; align-items:center; justify-content:center; }
.dark img, .light img { width: 92px; height: 92px; object-fit: contain; }
.full { display:flex; flex-direction:column; align-items:center; gap:6px; }
.full img { height: 100px; }
.nado { width:60px; height:60px; border-radius:8px; }
</style></head><body>
<div class="tile"><div class="dark"><img src="../assets/nadobro_glyph_transparent.png" alt=""></div><div class="name">NB glyph · dark</div><div class="meta">avatar / app icon</div></div>
<div class="tile"><div class="light"><img src="../assets/nadobro_glyph_transparent.png" alt=""></div><div class="name">NB glyph · light</div><div class="meta">over light bg</div></div>
<div class="full"><img src="../assets/nadobro_logo_full.png" alt=""><div class="name">Full lockup</div><div class="meta">hero / share card</div></div>
<div class="tile"><img class="nado" src="../assets/nado.png" alt=""><div class="name">Nado mark</div><div class="meta">"On Nado" source</div></div>
</body></html>
