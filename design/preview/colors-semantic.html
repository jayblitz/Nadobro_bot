<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.sw { border-radius: 14px; height: 96px; padding: 12px; display:flex; flex-direction:column; justify-content:space-between; border: 1px solid rgba(255,255,255,0.06); background:#0C1A28; }
.dot { width: 28px; height: 28px; border-radius:999px; }
.lbl { display:flex; gap:8px; align-items:center; font: 600 13px/1 var(--font-body); }
.hex { font: 500 11px/1.2 var(--font-mono); color: var(--fg-subtle); }
.use { font: 400 11px/1.3 var(--font-body); color: var(--fg-muted); }
</style></head><body>
<div class="grid">
  <div class="sw"><div class="lbl"><span class="dot" style="background:#44EE94"></span>buy / Long</div><div class="use">🟢 LONG, profit, primary CTA</div><div class="hex">--nb-buy · #44EE94</div></div>
  <div class="sw"><div class="lbl"><span class="dot" style="background:#FF4C4C"></span>sell / Short</div><div class="use">🔴 SHORT, liq, destructive</div><div class="hex">--nb-sell · #FF4C4C</div></div>
  <div class="sw"><div class="lbl"><span class="dot" style="background:#FFB547"></span>warn</div><div class="use">⚠️ risk, slippage</div><div class="hex">--nb-warn · #FFB547</div></div>
  <div class="sw"><div class="lbl"><span class="dot" style="background:#29D7E6"></span>info</div><div class="use">⚡ links, hairlines</div><div class="hex">--nb-info · #29D7E6</div></div>
  <div class="sw"><div class="lbl"><span class="dot" style="background:#FFFFFF"></span>fg-1</div><div class="use">values, headlines</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="lbl"><span class="dot" style="background:#BCC4D0"></span>fg-2</div><div class="use">labels</div><div class="hex">#BCC4D0</div></div>
</div>
</body></html>
