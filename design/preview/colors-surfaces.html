<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.sw { border-radius: 14px; height: 96px; padding: 10px 12px; display:flex; flex-direction:column; justify-content:flex-end; gap:2px; border: 1px solid rgba(110,226,240,0.18); }
.sw .name { font: 600 12px/1.2 var(--font-body); color: #fff; }
.sw .hex  { font: 500 11px/1.2 var(--font-mono); color: rgba(255,255,255,0.6); }
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#04090E"><div class="name">ink-1000</div><div class="hex">#04090E</div></div>
  <div class="sw" style="background:#07111A"><div class="name">ink-900 · page</div><div class="hex">#07111A</div></div>
  <div class="sw" style="background:#0C1A28"><div class="name">ink-800 · card</div><div class="hex">#0C1A28</div></div>
  <div class="sw" style="background:#122439"><div class="name">ink-700 · pill</div><div class="hex">#122439</div></div>
  <div class="sw" style="background:#1B324B"><div class="name">ink-600</div><div class="hex">#1B324B</div></div>
  <div class="sw" style="background:#2A4868"><div class="name">ink-500</div><div class="hex">#2A4868</div></div>
  <div class="sw" style="background:#17212B"><div class="name">tg-bg</div><div class="hex">#17212B</div></div>
  <div class="sw" style="background:#2B5278"><div class="name">tg out-bubble</div><div class="hex">#2B5278</div></div>
</div>
</body></html>
