<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 14px 18px; background: #17212B; }
.card { background: #182533; border-radius: 14px; padding: 14px 16px; max-width: 560px; color: #fff; border-bottom-left-radius: 4px; }
.hd { font: 700 16px/1.2 var(--font-body); margin-bottom: 6px; }
.rule { color: rgba(255,255,255,0.4); letter-spacing: -1px; font-family: var(--font-mono); margin: 4px 0 10px; user-select:none; }
.section { font: 700 13px/1.2 var(--font-body); color: var(--nb-cyan-300); margin: 10px 0 4px; }
.row { font: 400 14px/1.4 var(--font-body); color: #E6ECF2; }
.tree { color: rgba(255,255,255,0.4); font-family: var(--font-mono); }
.val { font-family: var(--font-mono); color: #fff; }
.pos { color: var(--nb-green-500); font-weight: 700; }
.neg { color: #FF4C4C; font-weight: 700; }
.insight { margin-top: 12px; color:#fff; }
</style></head><body>
<div class="card">
  <div class="hd">📋 Open Positions</div>
  <div class="rule">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</div>
  <div class="section">Snapshot</div>
  <div class="row"><span class="tree">├</span> 🌐 <b>Mode:</b> Mainnet</div>
  <div class="row"><span class="tree">└</span> 📌 <b>Total:</b> 2</div>
  <div class="section">BTC-PERP</div>
  <div class="row">🟢 <b>LONG</b> · Size: <span class="val">0.0500 BTC</span> · uPnL: <span class="pos">+$284.30</span></div>
  <div class="row">Entry: <span class="val">$107,402</span> · Mark: <span class="val">$108,450</span> · Liq: <span class="val">$92,180</span></div>
</div>
</body></html>
