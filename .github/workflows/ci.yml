name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Test suite (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      # DB-backed tests (tests/engine/test_*_db.py etc.) skip here: CI has no
      # DATABASE_URL and tests/conftest.py scrubs non-local DSNs. To run them
      # in CI later, add a postgres:16 service container and set
      # NADO_TEST_DATABASE_URL=postgresql://nadobro:nadobro@127.0.0.1:5432/nadobro_test
      # — validate the DB tests pass against it first.
      #
      # The full suite is green — keep it that way. If a test must be
      # temporarily skipped, use --deselect with a tracking comment here;
      # never let red tests accumulate silently again.
      - name: Run test suite
        run: python -m pytest -q

  typecheck:
    name: Type check (engine, mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: mypy (engine v2 — see mypy.ini)
        run: python -m mypy src/nadobro/engine
