name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Test suite (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nadobro
          POSTGRES_PASSWORD: nadobro
          POSTGRES_DB: nadobro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nadobro -d nadobro_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Local-host DSN passes the conftest scrub; conftest's
      # pytest_sessionstart bootstraps the schema via init_db().
      NADO_TEST_DATABASE_URL: postgresql://nadobro:nadobro@127.0.0.1:5432/nadobro_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      # The full suite (including the DB-backed tests, via the postgres
      # service above) is green — keep it that way. If a test must be
      # temporarily skipped, use --deselect with a tracking comment here;
      # never let red tests accumulate silently again.
      - name: Run test suite
        run: python -m pytest -q

  typecheck:
    name: Type check (engine, mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: mypy (engine v2 — see mypy.ini)
        run: python -m mypy src/nadobro/engine
