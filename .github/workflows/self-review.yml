name: Strategy Self-Review

# Runs the SL/TP & strategy-config invariants from
# docs/self_review/SELF_REVIEW_WORKFLOW.md. Known bugs are xfail (pass until
# fixed); a fixed bug XPASSes under strict=True and fails this job — the cue to
# delete its xfail marker.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  invariants:
    name: SL/TP & config invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest
      - name: Run strategy invariants
        run: python -m pytest tests/engine/test_sltp_invariants.py -v -p no:cacheprovider
